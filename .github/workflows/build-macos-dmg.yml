name: Build macOS DMG

# Builds the native LaughCounter.app and packages it into a downloadable .dmg —
# entirely on GitHub's macOS runners, so nobody needs Xcode locally.
#
# Where to get the DMG:
#  * Any run: open the run under the "Actions" tab → download the
#    "LaughCounter-dmg" artifact.
#  * Tagged releases: publish a GitHub Release and the .dmg is attached to it.

on:
  workflow_dispatch:        # lets you build on demand from the Actions tab
  push:
    branches: ["**"]
    paths:
      - "mac/**"
      - ".github/workflows/build-macos-dmg.yml"
  release:
    types: [published]

permissions:
  contents: write           # needed to attach the .dmg to a Release

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Build LaughCounter.app
        run: bash scripts/build-app.sh

      - name: Package .dmg
        run: bash scripts/make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaughCounter-dmg
          path: mac/dist/LaughCounter.dmg
          if-no-files-found: error

      - name: Attach DMG to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" dist/LaughCounter.dmg --clobber
        env:
          GH_TOKEN: ${{ github.token }}
