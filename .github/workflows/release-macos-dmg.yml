name: Release macOS DMG

# Publishing flow — two equivalent ways to cut a release, both build the app,
# package the DMG, and attach it to a GitHub Release so the README's stable
# "latest release" link (releases/latest/download/LaughCounter.dmg) resolves:
#   * push a version tag: `git tag v0.2.0 && git push origin v0.2.0`, or
#   * publish a Release from the GitHub UI (handy on mobile) that creates the tag.
# The tag-push path creates the Release with GITHUB_TOKEN, which by design does
# not re-fire the `release` event, so there's no double build.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

permissions:
  contents: write           # needed to create the Release and attach the .dmg

jobs:
  release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Build LaughCounter.app
        run: bash scripts/build-app.sh

      - name: Package .dmg
        run: bash scripts/make-dmg.sh

      - name: Publish Release with DMG
        env:
          GH_TOKEN: ${{ github.token }}
        # Create the release with the DMG attached; if the release already exists
        # (e.g. created in the UI, or a re-run), just (re)upload the DMG to it.
        run: |
          gh release create "$GITHUB_REF_NAME" dist/LaughCounter.dmg \
            --title "LaughCounter $GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/LaughCounter.dmg --clobber
