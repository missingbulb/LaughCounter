name: Release macOS DMG

# Publishes the DMG to GitHub Releases so the README's stable "latest release"
# link (releases/latest/download/LaughCounter.dmg) always resolves.
#
# It runs automatically on every push to `main` that touches the app: it builds
# the DMG and creates/updates the Release for the current app version (read from
# Info.plist), attaching LaughCounter.dmg. GITHUB_TOKEN can create the tag and
# Release from within Actions (a session's git proxy cannot). Publishing a Release
# from the GitHub UI, or a manual dispatch, work too.

on:
  push:
    branches: [main]
    paths:
      - "mac/**"
      - ".github/workflows/release-macos-dmg.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write           # create the tag/Release and attach the .dmg

jobs:
  release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Build LaughCounter.app
        run: bash scripts/build-app.sh

      - name: Package .dmg
        run: bash scripts/make-dmg.sh

      - name: Resolve release tag
        id: rel
        # On a UI-published release, use its tag; otherwise derive v<version> from
        # the app's Info.plist so a version bump publishes a new Release.
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            tag="$GITHUB_REF_NAME"
          else
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
            tag="v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish Release with DMG
        env:
          GH_TOKEN: ${{ github.token }}
        # Create the Release (and its tag at this commit) with the DMG attached; if
        # it already exists, just (re)upload the DMG. A Release made with
        # GITHUB_TOKEN does not re-fire the `release` event, so there's no loop.
        run: |
          tag='${{ steps.rel.outputs.tag }}'
          gh release create "$tag" dist/LaughCounter.dmg \
            --title "LaughCounter $tag" --generate-notes --target "$GITHUB_SHA" \
          || gh release upload "$tag" dist/LaughCounter.dmg --clobber
